services:
  db:
    image: postgres:16-alpine
    container_name: trekim-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trekim
      POSTGRES_PASSWORD: trekim123
      POSTGRES_DB: trekim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trekim"]
      interval: 5s
      timeout: 5s
      retries: 5
    dns:
      - 8.8.8.8
      - 1.1.1.1

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trekim-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://trekim:trekim123@db:5432/trekim?schema=public"
      JWT_SECRET: "${JWT_SECRET:-trekim-super-secret-jwt-key-change-in-production}"
      PAYSTACK_SECRET_KEY: "${PAYSTACK_SECRET_KEY:-}"
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: "${NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY:-}"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      DISABLE_SECURE_COOKIE: "true"
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  postgres_data:
